body:
  text: 寶髻大王菩薩本緣任遠譯題解寶髻本緣全名為吉祥聖雄寶髻大王菩薩本緣來自德國學者編校的大本生蔓第四十七章大本生蔓發現於尼泊爾是集本生與本緣故事為一體的一部古代佛教文獻的集子它的年代及最初產生流傳的地域目前尚不清楚全書共五十章本書最古老的寫本現仍存尼泊爾書中主要內容是傳說故事特別是關於佛修習善業的各種美德著重強調的是佛的慈悲和他為獲得最高正覺而進行的不懈努力其中第十至四十二章很接近大乘經典悲華經這些故事都反復警示這樣一個真理在日益沒落的世界上人們一定要用完美的行為走正確的道路對梵文本緣故事的學術研究大體集中在以下三位作者身上和作為文學遺產他們給我們留下了重要的本緣故事大本生蔓中的九個故事可以在的本生蔓在的以及在的著作中找到書中第四十三至四十八章自成體系是關於上述三位作家著作涉及的傳說故事彙集大本生蔓四十九章的寶髻本緣與任何寶髻故事的版本都不同著名的阿旃陀石窟雖然再現了許許多多本生故事卻沒有這一個比較至今為止所見到的所有寶髻故事版本這一篇篇幅最長描寫最細緻它通篇用詩體寫成共有頌語言是相當標準的古典梵文幾乎沒有見到任何佛教混合梵文的情況原寫本中有個巨大的闕失如在他的序言中指出的在第頌和頌之間有大約二十頁遺失了寶髻的故事有多種版本例如的寶髻本緣和所譯的世喜記以及其他一些學者的譯本寶髻大施捨的故事十分流行已經成為佛教大慈大悲無私施捨的典範並且常常用來作為佛教藝術作品的主題漢譯佛經中的寶髻也相當著名他以不同的身份出現在多種梵文以外的佛經中比如寶髻的名字曾以不同的背景再三地在不同的佛經中提到就目前可以斷定的從世紀以來對於寶髻故事的研究一直沒有中斷過最早的研究當數他是奠基人儘管他的研究工作被後人所批評但是他卻是接觸到這部本緣並且把它介紹到西方的第一人在他之後是他是被大家公認在世紀中傑出的佛學專家之一就近年的研究而言首先應該提到和其他一些學者很顯然這部典籍引起了一些學者的興趣上述學者在寶髻本緣的研究方面各自做出了不同的貢獻研究的價值一部分在於對各種寶髻故事寫本的研究總的說對寶髻本緣的研究工作大致分為三種類型即搜集校勘各種不同寫本翻譯以及分析其內容有幾位學者已經細細校閱過各種不同版本了在這裏要提的是和已將一種寶髻本緣從梵文譯成了英文而則出版了精選寶髻本緣其英譯本是從古代尼泊爾文譯就的除這些重要的工作之外還有一些與寶髻故事有關的文學作品比如月官的劇本世喜記在世尊往事書中有一部分對此作過一些研究還有一部寶髻本緣選自克什米爾詩人克什曼德拉的詩集菩薩如意本緣蔓除了翻譯寶髻的故事為了故事本身的尋根求源找出它的發展軌跡學者們也做出了極大努力例如在他的一篇題為一文中提出一種假設即視散失已久的古代故事集廣事集為以後各種版本的寶髻故事之本源然而事實上這個源頭和寶髻故事的發展與演變要比文中顯示的要複雜得多寶髻故事的根很可能不是那麼簡單明瞭地追溯到廣事集去我們也應該在印度文學中找到各種平行的類型它們應該包括廣事集而不止限於此比如類似的故事間接的或引用的可以在印度教的塞犍陀往事書佛教的普矅經和耆那教典籍超行傳中找到等對於寶髻故事的研究則更著眼於分析奉獻神奇的頭頂寶珠這一類犧牲行為的宗教實質簡而言之是對他過去惡業的救贖國際上佛教研究的學者對於本緣的研究與探討一直沒有間斷過寶髻本緣的研究只是其中一部分作為一篇獨立的本緣故事它不曾有過任何漢譯版本或許這篇翻譯可以對大家今後這方面的研究工作有一定幫助正文有一天阿育王雙手合十向優波笈多鞠躬行禮之後問道尊敬的長老我想多聽聽宗教方面的指教請您給我講講佛祖的故事聽到國王的懇求這個聰明而有自制力的羅漢優波笈多這樣講好偉大的國王啊請您聽吧過去我的老師怎麼對我說的今天我也如是向您講講願我這個故事會讓您喜歡故事是這樣的那時佛祖與大梵天一同享受著天上的種種快樂但他心裏並不高興因為他沒有機會去施捨別人什麼他很希望做一些善事心裏想現在世上到底什麼樣當他往下觀望的時候看到所有的人目中無法狂妄自大心中一片黑暗互相猜疑互相嫉妒甚至婆羅門的行為也很惡劣他們喪失了傳統的責任感他們貪婪吝嗇惡毒咒駡正法罪惡多端國王和他們的王公大臣僕從民眾一樣被盲目的驕傲與狂妄蒙蔽了雙眼他們同樣品行不端所有的美德都被認為是惡行他們都被污穢的烈火燃燒著當他們死去時全部墮入了地獄這些人沒有一個有德行的師父指點什麼是善所以所有的人都是非不分造下了罪孽看到這些佛祖想為了他們的將來我要從這兒下凡到人間我要不斷給他們提供各種所需之物讓各處眾生都皈依正法這樣所有人都會在正法中得到快樂他們會立誓求修行正果永遠走清淨之道如此所有眾生行為端正懂得正確的施捨的意義他們會成為遵守宗教傳統遵循正法的大菩薩為了這個緣故我要從這兒降生到人世間作為三千大千世界的主宰我要使全世界的人都品行端正這個想做善事的菩薩心中焦急雙手合十行禮環顧四周開口說道偉大的神啊現在世上罪惡流行人們品行不良十惡已成為潰瘍因此我要到世上去成為統治宇宙的主宰我要使他們覺悟使他端正品行神啊請您准許我去吧我發誓走覺悟之路為眾生的利益勤奮工作聽到這個懇請迦葉佛想了很久然後愉快地鼓勵說你去吧菩薩得了迦葉佛的許可心中歡喜從天空往下觀看他可能出生的處所當時在這個世界上有個大城市名叫薩迦達是個繁榮昌盛的地方人們豐衣足食不受自然災害侵擾這地方像天堂一樣沒有罪惡沒有小偷與無賴騷擾是個充滿智者與德行的地方梵授王遵紀守法統治這一方水土保護著這塊土地象父親守護兒子王后叫甘地瑪蒂美貌如幸運女神拉詩密她品行高潔體態婀娜從來不遠離丈夫身旁他們互相享受著在一起的樂趣國王梵授盡情享受著他的快樂看到這些菩薩從天而降在一個吉祥的日子裏他進入了皇后的身體這位聲音美妙的皇后從那時起便受了孕她想把她所有的財物都分給需要它們的人所以皇后在想著如何分發物品時來到了國王面前向他那蓮花般雙腳頂禮膜拜後開口說道國王啊請您發善心讓我滿足我的願望吧請讓我得到您的許可吧國王聽到他最心愛的王后這樣請求他溫和地笑了看著她說我會滿足你的願望的請你實實在在告訴我那個願望究竟是什麼呢王后聽了國王這些話目不轉睛地看著國王說親愛的丈夫啊我想要站在一大堆金子上然後毫不遲疑地把這些金子分給沙門婆羅門和其他人國王聽到這些話十分驚訝遂將這些話告訴了宮廷中的祭司看看他能不能理解其中含義這個知識豐富頭腦聰慧的預言家聽到國王一說就明白了這些徵兆的含義他回答國王說陛下您的皇后毫無疑問是有孕了所有這些預兆都顯示了她那個腹中生命的力量我敢肯定您的兒子必定是個聰明的大人物國王啊要是您允許我說的話我要說所有這些都顯示了您的幸福和榮耀啊聽了這些話國王很高興他給了預言家應有的榮耀決定按著王后的意願行事他來到王后面前高興地對她說你想怎麼做就去做吧得了國王的准許王后很興奮就開始準備了她站在一大堆金子上把所有的金子都隨心所欲地贈送給沙門婆羅門和任何想要金子的人然後王后又希望看到所有的人都滿意的享受具有六種美味的菜肴又得到國王的許可她安排了這一切滿意地看著大家享用她的美食她懷著極大的敬意邀請所有人來到宮裏給他們準備了禮物用具有六種美味的食品款待他們她非常喜悅地看到所有的人包括窮人和需要幫助的人都盡情享受了她的美食大餐這時品德高尚的王后想坐上獅子寶座向人們講授正法國王批准了她的請求王后興高采烈地登上寶座召集所有人來到跟前向他們宣講正法國王又一次詢問預言家們這些都意味著什麼他們想了一下便這樣回答國王偉大的國王啊那個在王后腹中的是一個偉大的人物因為他的力量而王后會宣講正法所以偉大的國王成全王后的意願讓她宣講正法吧她時刻都在關心著眾生的幸福呢聽到這樣的解釋國王很高興他命人把宮殿內外打掃乾淨裝飾美觀然後又把嵌滿了寶石和金子的獅子寶座放好上面張有用美麗的薄紗及中國絲綢裝飾的華蓋然後這個人中之王召集所有的傳令者看到他們都到齊了就說請大家注意王后要對每個人宣講正法現在你們馬上去把所有的公民都召集到這裏來一聽完國王的命令他們馬上向國王鞠躬行禮高興地領命而去他們敲響了全城所有的鐘向民眾傳佈道所有的人都聽著啊聽國王的命令啊王后要宣講正法誰想要懂得真正的德行趕快過來聽真正的法吧聽到這些話所有的人都吃了一驚他們都高興地來到了王宮聽王后宣講正法這時王后甘地瑪蒂已經戴上了所有的裝飾品登上了大廳中的獅子寶座興高采烈的民眾見到了光彩照人的王后向她行禮尊敬地注視著她然後在大廳各自坐下當王后見到人們坐下了她看著他們靜靜地沈默了一會兒然後借助著她腹中有著偉大智慧的菩薩她向民眾宣講了正法只有保持佛法遵守善行的人才會獲得最大的滿足與榮耀在危難時他會遠離煩惱在來世他會獲得喜樂與安慰法自始至終照護著那些遵循它的人就像父親保護他的有善行的兒子一樣一個聰明人要是他有堅強的意志應該奉獻一生自始至終遵循著佛法正法照護著那些有善行的人就像一把大傘在淫雨季節給人遮風擋雨佛祖唱頌著對法的讚美奉行正法的人不會再有苦難的轉世來生不遵循正法的那些人他們漫不經心堅持偏見褻瀆正法永遠擺脫不了生生世世的輪回束縛就像一隻鹿上了獵人的圈套一樣遵循正法與違背正法帶來不同的後果違背正法的人要下地獄而遵循正法的人來世會有好報知道這一點想獲得真正幸福的人就應該摒棄一切不善不義的行為心懷虔誠聆聽正法他們應該遵循信仰的正確之道所有的人聽了王后這一番教誨心懷喜悅衷心表示要遵循正法開始有道德的生活然後王后想去花園裏看看她又向國王表示了這番心願國王聽到這個請求派人把城市各處打掃乾淨到處都裝飾起來花園和湖泊清理乾淨裝點得漂漂亮亮他請王后坐上了車前後左右跟有許多隨從僕人高高興興地來到花園當她一到看到如此漂亮的花園下了車滿心欣喜地信步走著花園裏有四時之花四季之果簡直就像大梵天的仙境一樣湖泊中注滿潔淨的清水水中競相開放著各種蓮花有紅色藍色的還有各種水鳥王后散著步看著這美不勝收的景色心花怒放精神抖擻充滿著喜悅她欣賞了很久很久走得累了纔坐在湖邊樹蔭下休息看著這個四季
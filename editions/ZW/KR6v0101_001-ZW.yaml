寶石使全世界覺悟他使世界上每個人都放棄了迷途而遵循四梵行他把他們帶上求正覺之路使他們實踐一切高尚的行為在正法中他使世界高尚他皈依了三寶立下了求正覺的誓言為世上的福利而努力這個功德帶來的結果使他制服了整個魔旬一族他從一切痛苦和煩惱中解脫在罪惡時代他就獲取了正覺升到天上王后耶輸陀羅曾經就是帕瑪瓦蒂而國王帕摩達拉不是別人正是佛陀的兒子羅睺羅有大智慧的舍利弗羅漢曾是他們的宮庭祭司這個再生族的名字叫梵車智者阿難就是聖者巴伐菩提而那個佛祖最有名的弟子迦葉就是聖者馬立奇偉大的淨飯王佛祖的父親就是寶髻王的父王梵授而偉大的王后摩耶尊者的母親不是別人正是王后甘地瑪蒂寶髻的母親曾有魔力的大目犍連就是那個罪惡的魔旬僧人那揭羅就是帝釋他曾經化為妖魔在祭火中出現婆得利伽為首的五百隨從曾經是寶髻的大臣及宮廷隨員提婆達多就是以前的難敵王而迦旃延阿尼律陀富樓那和須菩提是那四個取走寶髻頭頂上寶石的婆羅門後來在這個有福之人成就了這樣一件極為困難的施捨之後遵循他修菩提行的誓言為了世上眾生的利益而努力這樣他逐步完成了所有方面宗教的修行為了一切眾生的利益獲得了最高無上的正覺明白了這個道理誰想修得好來世的誰就應該滿懷喜悅和虔信傾聽世界上這位偉大的導師教誨的真理那些懷著喜樂和虔信聆聽了世界導師的正法的人不會墮入地獄而轉世在天上在天上他們是榮耀和高尚真理的化身他們成了菩薩實踐著求正覺的路而他們一旦滿足了求正覺的各種條件就獲得了三正覺和最後的解脫現在偉大的國王啊想過所有的這一切一個人應該經常聽這個有福之人傳佈的偉大教誨並且以此來教誨世人聽了羅漢的指教阿育王很高興他向羅漢鞠了躬雙手合十問羅漢道寶髻過去修了什麼功德使他成為尊者世界之王呢什麼功德使他具有頭上的寶石還有他出生時候的天降花雨呢什麼功德使他出生時候天神舉起了聖旗天樂在四面八方奏起來呢為什麼那個時刻天神會在空中舉起鑲了珠寶的華蓋而地上各處充滿歡樂呢他的榮耀遍及四方他是菩薩是偉大的施捨者別人又叫他一切施而那個無價之寶第二次又出現在他的頭上這又是怎麼一回事請給我們講一講聽到國王問這個問題高貴的優婆笈多看著國王回答道您問了一個很好的問題偉大的國王請您聽啊我要簡要告訴你寶髻在過去所做的一切善行故事是這樣的從前有一位得了正覺的大師佛陀叫做尸棄頂髻佛這個有福的人曾經是個羅漢是善行之王也是聖者之王他是無所不在的世界主宰在世上各處傳播正法為一切眾生的福利而努力有一次這個大師尊者住在摩訶魯那瓦蒂城裏與他的隨從者一起傳播正法他與在家弟子一起住在一個帶有美麗花園的寺廟中為眾生利益而努力使佛法遠揚這樣尊者使全世界充滿美德人人都遵從他的教導他成就了成佛的願望得到了最後的解脫看到這個事情國王阿魯納為大師安排了適當的葬禮把他的舍利收撿後又以適當的儀式使它們淨化然後這個國王就把舍利子放在他修建的有大量寶石裝飾的佛塔的小室內這個國王人中之王帶著無比的敬意走近寶塔懷著喜悅以各種方式向寶塔敬拜這樣國王使所有臣民都懷著喜悅敬拜了寶塔他還訂立了一個節日人們興高彩烈地慶賀這個節日以這樣的方法這個人中之王心懷喜悅對寶塔充滿虔信他的大臣和市民百姓也經常與他一起來以各種方式敬拜寶塔漸漸地國王越來越老了心中念著佛陀遺棄了他的身體升上了極樂天那些懷著喜樂敬拜寶塔對它充滿虔信的人們到了該去的時間遺棄了他們的身體也升上了極樂天過了一些時候這個寶塔變得破舊了殘敗了風和雨的侵蝕完全毀壞了它最後它終於倒塌了國王阿魯納的兒子看見寶塔毀壞了他心中念著三寶的高尚想著哎不好了這個寶塔曾經是佛身在世上的象徵是佛法的榮耀高尚的體現是對完美無上正覺智慧的集中表現而現在它倒了寶塔成了廢墟即使那些心懷虔信的人們也不能來敬拜慶賀了我要修好這座寶塔要用適當的與之相配的禮儀崇拜它還要用旗幟和華蓋把它裝飾起來這樣所有的人又會看到這個美麗的寶塔他們會很高興心中滿懷敬意而前來崇拜它爾後他們三輪潔淨成為佛法這高尚品行榮耀的代表成為求正覺的實踐者他們使頭腦更加純潔遠離諸多煩惱淨修梵行會得到三種正覺和最後的解脫這個具有佛法崇高德行的國王這樣考慮後命人把寶塔恢復了裝飾好了然後興高采烈的國王把他自己王冠上的那塊寶石取下置於寶塔之上使它變得更加漂亮他又用旗幟華蓋美麗的織物首飾和用各種鮮花製成的花環裝飾了寶塔使寶塔熠熠生輝他懷著熱忱向寶塔獻上祭物滿懷喜悅地敬拜了它並安排了適當的禮儀他命人們在那裏演奏各種樂器把那裏變成了一個喜慶的節日他又點燃了注有芬芳香味燈油的燈自己頭上也置著一盞燈燈內燃燒著五種不同的純淨的油他把蓮花獻在塔前自右向左繞塔然後他拜倒在塔前懷著喜悅向它禮拜立下了如下誓言當我獲得了這個功德後當我為世上一切眾生而謀利之後願我取得正覺和最後的解脫在塔前立下了這個誓言之後國王阿魯納的兒子經常來敬拜寶塔每次都懷著極大的喜悅和快樂這樣他一直敬拜著佛塔過著幸福的日子最後他心中念著佛陀轉生到了佛土他曾經是個國王是個偉大的人也是個強有力的主人是國王阿魯納的兒子後來他成為了寶髻王人們的偉大君主因為他為尸棄佛建塔而得到功德他成為了世界之主宰財富的施者和正法的教誨者因為他用華蓋裝飾寶塔得到的功德使他的出生伴有各種吉祥景象興高采烈的天神用美麗寶石裝飾的華蓋和牦牛尾制的拂塵罩在他上方由於他向有彩旗裝扮起來的寶塔敬拜所以在他降生的時候眾神舉著各色旌旗表示慶賀而因為他把自己王冠上的寶石拿下來置寶塔頂上來世這個具有無窮無盡奇妙作用的寶石就出現在他的頭上因為他曾經把燃燒著五種最上等油的燈盞置於頭上這個功德使第二次頭上出現與第一次同樣奇異的寶石這樣這個對寶塔虔信崇拜的偉大的人成功地設立了寶塔的節慶經常熱忱地敬拜著它他還使別人也與他一樣敬拜這座寶塔時時刻刻向它致敬善業帶來了巨大力量使他這個偉大的世上傑出的具有一切優秀品行的人成為菩薩而在他的另一生中偉大寶髻曾經是個商隊的頭領他曾經為眾生的利益而努力有一次他和其他商人在海洋中欣喜地采得了一些珠寶然後在他們回來的路上經過一座大森林在那密密的林子裏他遇見一位獨覺佛正依著樹根坐著受著由於劇毒帶來的劇痛的煎熬看到這個獨覺佛眾商人的首領立即走向前去雙手合十行禮問道尊敬的人啊您是不是有病了我希望能幫助您請您告訴我您現在需要什麼聽到他這樣問獨覺佛看著富有的商隊首領好一會然後耳語般地說啊富有的王啊一條蛇咬了我的腳現在毒液已經蔓延到身體各處使我非常疼痛聽完這個聰明的人立即找來一些草藥塗在獨覺佛身上立刻他就痊愈了獨覺佛康復後心中極為高興看著商人的首領給了他深深的祝福商人的首領愉快地向獨覺佛鞠躬雙手合十立誓說苦行僧之王的身體被劇毒折磨而我用草藥塗抹給他治癒了因為這一件事也因為他對我滿意因此功德讓我生生世世成為眾生的醫生為他們醫治百病也因此功德讓那些人們在用了我洗過的水之後變得健康強壯感官純淨立下如此的誓言後商隊首領又向獨覺佛行了禮高興地離開了然後在一群商人的伴隨下他歡喜地來到他自己的住處他到了以後向熟人親戚和朋友們互相問了好幸福地生活著這個擁有高尚情操財富和美德的象君王一般傑出的人慷慨地對眾人施捨滿足他們的一切要求自己心中也總是充滿了幸福這樣他愉快地為眾生的福利而忙碌自己皈依了三寶過著德行的生活在他臨終的時候他的心中只想著三寶在脫離了他的肉身之後他升上了天在天上這個偉大的人教導所有的天神敬拜著三寶一直過著高尚的生活後來他在某一個時辰為了眾生他從天上降生到人間托生於一個剎帝利家庭成為寶髻王這樣眾商人之首領成了人們的王叫寶髻而實際上他並非凡人正是我們的大師釋迦牟尼以同樣方式這個有大福德的大師在過去無數生中曾降生于王者之家去世後他成了全世界的主宰在他所有的生生世世中這個偉大的人總是施捨一切給需求的人也總是一心念著正覺在他無數過去生中他也做了無數非常艱難的事仍然心繫著獲得最高的覺悟所以即使是在罪惡充斥的時代菩薩得以借這些功德的力量戰勝所有的魔旬而他自己解脫了煩惱淨化了感官他曾經是阿羅漢也得到過覺悟成為眾聖者之王這個有福德之人這個大師教誨所有眾生使他們遵循正覺之路實行善德這三界之主宰也用同樣的方法使全世界都遵循他的教導之後成就了佛陀的業跡而得到了最後的解脫一切向往正覺的眾生應該懷著歡愉聆聽世界的導師關於成就正覺的精彩教誨而那些真正懷著虔信崇拜與尊敬的心情聆聽尊者關於正覺之路的教誨將會心靈淨化他們會成為真正美德與榮耀的集中體現所有這些眾生都可以成為菩薩和偉大的生靈他們都會實行四梵行在皈依三寶之後他們會為獲得正覺而立誓他們會不斷遵循著所立下為獲得正覺的誓言為世界的利益而努力他們所有的人都會在三輪中變得美好純淨在世界各處為了成就正法而竭盡全力他們所有的人都會變得堅定不移通曉一切解脫之法在各處自由自在地修功德他們所有人都將沒有煩惱全會證得阿羅漢果實施他們宗教的責任他們全部能夠戰勝魔旬的一群而達到正覺的境界他們將會成為佛一切美德之王聖人的主宰他們將要教誨正法使一切眾生覺悟然後將三界中所有的人引導到求正覺之路在那裏他們可以成為正法的化身光芒四射至善至美而引導三界中所有的人為世界福利而努力這些佛會使整個世界成為有德行的世界修一切善行之後會獲得最終的解脫這個真理曾經被所有的聖者之王宣教我上面講述的是完全按照我從我的師父所聽到而說的好好想想吧您應該聆聽大師的那些關於求正覺的精闢論述而且也使您的臣民們都聽到它這樣毫無疑問您會幸福消除一切煩惱您永遠不會下地獄而永遠會有好的來生轉世您具備所有的優秀品行和榮耀您享受巨大的幸福在您臨終時候您的心會念著三寶而升到佛土聽了這些入情入理的指教明白了這個真理以後您皈依三寶實行求正覺的誓言吧知道了人們是要自食其果毫無疑問您應該在世上永遠行善事因為您造的業將陪伴著您即使過了千劫萬劫也是一樣而當所有的條件成熟了時間到了所有的事都會在六道輪回中顯示出果報來過去造的業火燒不壞水浸不爛風吹不走土埋不掉善業必定有善報惡業有惡報善惡混合的將有混合報當您明白了這個道理王中之王啊您就應該永遠避免惡業和混合業那些期望好運的應該心悅承服地遵循最好的行為準則它會成就正覺聽完這位阿羅漢的指教阿育王非常高興他滿懷著感激之情對這個僧人說我會這樣做那些滿懷喜樂傾聽寶髻故事的崇敬佛陀美德的那些心中充滿虔信與喜悅的把這些故事講給別人聽的愉快地把大雄的聖德傳誦給別人的所有這些菩薩皈依三寶後會消除傲慢成為優秀榮耀與美德的化身他們心中極為純淨為一切眾生而工作他們永遠從事善事捨棄三不淨虔信美德遵循最高的宗教實踐他們具備了所有良好品行成為所有宗教行為的最好表率他們享受了幸福財富和歡樂最後得到了具有十力的佛在天上的祝福正文完
